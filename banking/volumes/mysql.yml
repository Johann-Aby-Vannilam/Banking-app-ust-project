apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: banking-app
type: Opaque
data:
  # rootpassword
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  # replicationpassword
  MYSQL_REPLICATION_PASSWORD: cmVwbGljYXRpb25wYXNzd29yZA==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: banking-app
data:
  primary.cnf: |
    [mysqld]
    log-bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    sync_binlog=1
    innodb_flush_log_at_trx_commit=1
    skip-host-cache
    skip-name-resolve
  replica.cnf: |
    [mysqld]
    super-read-only=1
    log-bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    log_replica_updates=ON
    relay-log=relay-bin
    skip-host-cache
    skip-name-resolve
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: banking-app
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS banking_db;
    USE banking_db;

    CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(255) UNIQUE NOT NULL,
        password VARCHAR(255) NOT NULL,
        email VARCHAR(255) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS accounts (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        account_number VARCHAR(50) UNIQUE NOT NULL,
        balance DECIMAL(15, 2) DEFAULT 0.00,
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    CREATE TABLE IF NOT EXISTS transactions (
        id INT AUTO_INCREMENT PRIMARY KEY,
        from_account_id INT,
        to_account_id INT,
        amount DECIMAL(15, 2) NOT NULL,
        status VARCHAR(50) NOT NULL,
        timestamp DATETIME DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS loans (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT NOT NULL,
        amount DECIMAL(15, 2) NOT NULL,
        status VARCHAR(50) DEFAULT 'PENDING',
        FOREIGN KEY (user_id) REFERENCES users(id)
    );

    -- Create replication user (runs on all pods but only matters on primary)
    CREATE USER IF NOT EXISTS 'replicator'@'%'
      IDENTIFIED WITH mysql_native_password BY 'replicationpassword';
    GRANT REPLICATION SLAVE ON *.* TO 'replicator'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: banking-app
spec:
  serviceName: "mysql"
  replicas: 3
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      initContainers:
      # Sets per-pod server-id and copies primary/replica my.cnf based on pod ordinal
      - name: init-mysql
        image: mysql:8.0
        command:
        - bash
        - "-c"
        - |
          set -ex
          # Extract ordinal from hostname (mysql-0, mysql-1, mysql-2)
          [[ $(hostname) =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}

          mkdir -p /mnt/conf.d
          # Write unique server-id (100=primary, 101=replica1, 102=replica2)
          printf "[mysqld]\nserver-id=%d\n" "$((100 + $ordinal))" > /mnt/conf.d/server-id.cnf

          # Copy role-specific config
          if [[ $ordinal -eq 0 ]]; then
            cp /mnt/config-map/primary.cnf /mnt/conf.d/base.cnf
          else
            cp /mnt/config-map/replica.cnf /mnt/conf.d/base.cnf
          fi
        volumeMounts:
        - name: conf
          mountPath: /mnt/conf.d
        - name: config-map
          mountPath: /mnt/config-map

      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - name: mysql
          containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          value: banking_db
        - name: MYSQL_ROOT_HOST
          value: "%"
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        # postStart: replica pods configure GTID replication to mysql-0
        lifecycle:
          postStart:
            exec:
              command:
              - bash
              - "-c"
              - |
                set -ex
                [[ $(hostname) =~ -([0-9]+)$ ]] || exit 1
                ordinal=${BASH_REMATCH[1]}
                # Primary pod does nothing
                [[ $ordinal -eq 0 ]] && exit 0

                # Wait for own MySQL to accept connections (max 240s)
                DEADLINE=$(( $(date +%s) + 240 ))
                until mysqladmin ping -h 127.0.0.1 --silent 2>/dev/null; do
                  [[ $(date +%s) -gt $DEADLINE ]] && { echo "Timed out waiting for local MySQL"; exit 1; }
                  sleep 3
                done

                # Wait for primary (mysql-0) to be reachable (max 300s)
                DEADLINE=$(( $(date +%s) + 300 ))
                until mysql -h mysql-0.mysql.banking-app.svc.cluster.local \
                  -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SELECT 1" 2>/dev/null; do
                  [[ $(date +%s) -gt $DEADLINE ]] && { echo "Timed out waiting for primary"; exit 1; }
                  echo "Waiting for primary mysql-0..."
                  sleep 5
                done

                # Skip if replication already running
                RUNNING=$(mysql -h 127.0.0.1 -u root -p"${MYSQL_ROOT_PASSWORD}" \
                  -e "SHOW REPLICA STATUS\G" 2>/dev/null | grep "Replica_IO_Running: Yes" || true)
                [[ -n "$RUNNING" ]] && { echo "Replication already running, skip."; exit 0; }

                echo "Configuring GTID replication to primary mysql-0..."
                mysql -h 127.0.0.1 -u root -p"${MYSQL_ROOT_PASSWORD}" <<'EOF'
                STOP REPLICA;
                RESET REPLICA ALL;
                CHANGE REPLICATION SOURCE TO
                  SOURCE_HOST='mysql-0.mysql.banking-app.svc.cluster.local',
                  SOURCE_USER='replicator',
                  SOURCE_PASSWORD='replicationpassword',
                  SOURCE_PORT=3306,
                  SOURCE_AUTO_POSITION=1,
                  SOURCE_CONNECT_RETRY=10;
                START REPLICA;
                EOF
                echo "Replication configured successfully."
        startupProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - 127.0.0.1
          initialDelaySeconds: 240
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - 127.0.0.1
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - 127.0.0.1
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5
          timeoutSeconds: 10

      volumes:
      - name: conf
        emptyDir: {}
      - name: config-map
        configMap:
          name: mysql-config
      - name: init-script
        configMap:
          name: mysql-init-script

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: nfs-client
      resources:
        requests:
          storage: 5Gi
---
# Headless service – stable DNS for each pod (mysql-0.mysql, mysql-1.mysql, mysql-2.mysql)
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: banking-app
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
---
# ClusterIP service – load-balanced reads across all replicas
apiVersion: v1
kind: Service
metadata:
  name: mysql-read
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
